name: Release

on:
  push:
    tags:
      # Semver tags: v0.1.0, v1.2.3-rc.1, etc.
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release from tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with full history for notes)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect whether this tag points at main
        id: on_main
        run: |
          # Only publish a release when the tagged commit is reachable from
          # origin/main. This prevents accidental releases from feature
          # branches that happen to be tagged with a vX.Y.Z format.
          git fetch origin main --depth=100
          if git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "reachable=true" >> "$GITHUB_OUTPUT"
          else
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ github.ref_name }} does not point at a commit on main — skipping release."
          fi

      - name: Create release with autogenerated notes
        if: steps.on_main.outputs.reachable == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag
