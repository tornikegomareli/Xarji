name: CI

on:
  # Trigger on every pull request regardless of base branch so stacked
  # PRs (PR B based on PR A while A is still open) still get CI coverage.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel older runs when a PR gets new commits so we only ever test the tip.
concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  service:
    name: service — typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Tests
        run: bun run test

  client:
    name: client — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # `bun run build` is `tsc -b && vite build` — it covers both the type
      # check and the production bundle, so a single step is enough.
      - name: Build
        run: bun run build

  menubar:
    name: menu-bar app — swift build
    # Swift builds require a macOS runner; arm64 matches the app's
    # target architecture so we catch any arm64-only issues in CI.
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app-menubar
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build -c debug --arch arm64

      - name: Build (release)
        run: swift build -c release --arch arm64
